# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# Site Settings
title: "UMAAL"
remote_theme: daattali/beautiful-jekyll
description: "University of Montana Lab Focuses on Understanding the world through Computer Science"
url: "" # the base hostname & protocol for your site e.g. "https://mmistakes.github.io"
baseurl: "" # the subpath of your site, e.g. "/blog"

# Beautiful Jekyll specific settings
show_downloads: false
plugins:
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-remote-theme

# Site Author
author:
  name: "Lucia Williams"
  avatar: "/images/profile.png"
  bio: ""
  location: "University of Montana"
  email: "lucia.williams@umt.edu"
  uri: ""
  linkedin: ""
  github: ""
  twitter: ""
  google_scholar: "https://scholar.google.com/citations?user=2zn8lhsAAAAJ&hl=en&oi=ao"

# Navigation - Beautiful Jekyll uses pages for navigation
# Make sure you have these pages: index.md, about.md, members.md, research.md, teaching.md

# Social Sharing
share: false # Disable social sharing buttons if not needed

# Comments (optional)
comments: false

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  research:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults - UPDATED for Beautiful Jekyll
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author_profile: true
      share: false
      comments: false
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page
      author_profile: false
  # Main pages (like index.md, about.md)
  - scope:
      path: ""
      type: pages
    values:
      layout: page
      author_profile: false
  # _teaching
  - scope:
      path: "_teaching"
    values:
      layout: page
      author_profile: false
      share: false
      comments: false
  # _research
  - scope:
      path: "_research"
    values:
      layout: page
      author_profile: false
      share: false
      comments: false
  # _publications
  - scope:
      path: "_publications"
    values:
      layout: page
      author_profile: true
      share: false
      comments: false
  # _talks
  - scope:
      path: "_talks"
    values:
      layout: page
      author_profile: true
      share: false

# Outputting
permalink: /:categories/:title/
timezone: America/Denver

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
