---
layout: default
---

<style>
    .avatar-container {
        display: none !important;
    }
</style>

<div class="container">
    <nav class="navbar">
        {% for item in site.data.navigation.main %}
          <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
        {% endfor %}
    </nav>
    <article class="post">
        <header class="post-header">
            <h1 class="post-title">{{ page.title }}</h1>
        </header>

        <div class="post-content">{{ content }}</div>
    </article>
</div>
